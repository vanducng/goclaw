name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # stable only: v1.2.3 (not beta/rc)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v3.0.0). Leave empty to use latest tag on HEAD.'
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: dataplanelabs/goclaw

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      released: ${{ steps.version.outputs.version != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: version
        run: |
          # Priority: workflow_dispatch input > pushed tag > latest tag on HEAD
          TAG="${{ inputs.tag || github.ref_name }}"
          if [[ -z "$TAG" || "$TAG" == "main" || "$TAG" == "dev" ]]; then
            TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo "")
          fi
          if [[ -z "$TAG" ]]; then
            echo "No tag found. Skipping release."
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION="${TAG#v}"
          echo "Releasing version: $VERSION (tag: $TAG)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.version.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          gh release create "$TAG" \
            --title "GoClaw $TAG" \
            --generate-notes \
            --latest \
            2>/dev/null || echo "Release $TAG already exists, continuing..."

  # Build cross-platform binaries and attach to release
  build-binaries:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build web UI
        run: |
          corepack enable && corepack prepare pnpm@10.28.2 --activate
          cd ui/web && pnpm install --frozen-lockfile && pnpm build && cd ../..
          mkdir -p internal/webui/dist
          cp -r ui/web/dist/* internal/webui/dist/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: v${{ needs.release.outputs.version }}
        run: |
          CGO_ENABLED=0 go build -tags embedui \
            -ldflags="-s -w -X github.com/nextlevelbuilder/goclaw/cmd.Version=${VERSION}" \
            -o goclaw .
          tar -czf "goclaw-${{ needs.release.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" goclaw migrations/

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.release.outputs.version }}" \
            "goclaw-${{ needs.release.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
            --clobber

  # Generate SHA256 checksums for all binary assets
  checksums:
    needs: [release, build-binaries]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all binary assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download "v${{ needs.release.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --pattern "goclaw-*.tar.gz" \
            --dir assets

      - name: Generate checksums
        run: |
          cd assets
          sha256sum goclaw-*.tar.gz > CHECKSUMS.sha256
          echo "Generated checksums:"
          cat CHECKSUMS.sha256

      - name: Upload checksums to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.release.outputs.version }}" \
            assets/CHECKSUMS.sha256 \
            --repo "${{ github.repository }}" \
            --clobber

  # Stage 1: Build per-arch images on native runners (no QEMU)
  docker-images-build:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ${{ matrix.platform.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        variant:
          - { name: base,   suffix: "-base",  enable_otel: "false", enable_embedui: "false", enable_python: "false", enable_full_skills: "false" }
          - { name: latest, suffix: "",       enable_otel: "false", enable_embedui: "true",  enable_python: "true",  enable_full_skills: "false" }
          - { name: full,   suffix: "-full",  enable_otel: "false", enable_embedui: "true",  enable_python: "true",  enable_full_skills: "true"  }
          - { name: otel,   suffix: "-otel",  enable_otel: "true",  enable_embedui: "true",  enable_python: "true",  enable_full_skills: "false" }
        platform:
          - { name: "linux/amd64", runs_on: ubuntu-latest,    arch: amd64 }
          - { name: "linux/arm64", runs_on: ubuntu-24.04-arm, arch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform.name }}
          outputs: type=image,"name=${{ env.GHCR_IMAGE }},${{ env.DOCKERHUB_IMAGE }}",push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ENABLE_OTEL=${{ matrix.variant.enable_otel }}
            ENABLE_EMBEDUI=${{ matrix.variant.enable_embedui }}
            ENABLE_PYTHON=${{ matrix.variant.enable_python }}
            ENABLE_FULL_SKILLS=${{ matrix.variant.enable_full_skills }}
            VERSION=v${{ needs.release.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.variant.name }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant.name }}-${{ matrix.platform.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.variant.name }}-${{ matrix.platform.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stage 2: Merge per-arch digests into multi-arch manifests per variant
  docker-images-merge:
    needs: [release, docker-images-build]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - { name: base,   suffix: "-base"  }
          - { name: latest, suffix: ""       }
          - { name: full,   suffix: "-full"  }
          - { name: otel,   suffix: "-otel"  }
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-${{ matrix.variant.name }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=v${{ needs.release.outputs.version }},suffix=${{ matrix.variant.suffix }}
            type=raw,value=latest,enable=${{ matrix.variant.suffix == '' }},suffix=
            type=raw,value=${{ matrix.variant.name }},enable=${{ matrix.variant.suffix != '' }}

      - name: Create and push multi-arch manifest (GHCR)
        run: |
          cd /tmp/digests
          DIGESTS=$(printf "${{ env.GHCR_IMAGE }}@sha256:%s " *)
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("ghcr.io")) | "-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $DIGESTS

      - name: Create and push multi-arch manifest (Docker Hub)
        run: |
          cd /tmp/digests
          DIGESTS=$(printf "${{ env.GHCR_IMAGE }}@sha256:%s " *)
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("${{ env.DOCKERHUB_IMAGE }}")) | "-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $DIGESTS

      - name: Inspect manifests
        run: |
          for tag in $(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON"); do
            docker buildx imagetools inspect "$tag"
          done

  # Stage 1: Build web UI image per-arch on native runners (no QEMU)
  docker-web-build:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ${{ matrix.platform.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: "linux/amd64", runs_on: ubuntu-latest,    arch: amd64 }
          - { name: "linux/arm64", runs_on: ubuntu-24.04-arm, arch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}-web
            ${{ env.DOCKERHUB_IMAGE }}-web

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ui/web
          platforms: ${{ matrix.platform.name }}
          outputs: type=image,"name=${{ env.GHCR_IMAGE }}-web,${{ env.DOCKERHUB_IMAGE }}-web",push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=web-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=web-${{ matrix.platform.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-web-${{ matrix.platform.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stage 2: Merge web UI per-arch digests into multi-arch manifest
  docker-web-merge:
    needs: [release, docker-web-build]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-web-*
          path: /tmp/digests
          merge-multiple: true

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}-web
            ${{ env.DOCKERHUB_IMAGE }}-web
          tags: |
            type=raw,value=v${{ needs.release.outputs.version }}
            type=raw,value=latest

      - name: Create and push multi-arch manifest (GHCR)
        run: |
          cd /tmp/digests
          DIGESTS=$(printf "${{ env.GHCR_IMAGE }}-web@sha256:%s " *)
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("ghcr.io")) | "-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $DIGESTS

      - name: Create and push multi-arch manifest (Docker Hub)
        run: |
          cd /tmp/digests
          DIGESTS=$(printf "${{ env.GHCR_IMAGE }}-web@sha256:%s " *)
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("${{ env.DOCKERHUB_IMAGE }}-web")) | "-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $DIGESTS

      - name: Inspect manifests
        run: |
          for tag in $(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON"); do
            docker buildx imagetools inspect "$tag"
          done

  # Notify Discord on new release (runs even if docker jobs fail)
  notify-discord:
    needs: [release, build-binaries, docker-images-merge, docker-web-merge]
    if: always() && needs.release.outputs.released == 'true' && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: v${{ needs.release.outputs.version }}
        run: |
          curl -fsSL -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"GoClaw ${VERSION} Released\",
                \"url\": \"https://github.com/${{ github.repository }}/releases/tag/${VERSION}\",
                \"color\": 5814783,
                \"fields\": [
                  {\"name\": \"Docker\", \"value\": \"\`docker pull dataplanelabs/goclaw:latest\`\", \"inline\": false},
                  {\"name\": \"Install\", \"value\": \"\`curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash\`\", \"inline\": false}
                ],
                \"footer\": {\"text\": \"${{ github.repository }}\"},
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" \
            "$DISCORD_WEBHOOK_URL"
